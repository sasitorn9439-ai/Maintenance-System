<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;gap:8px"><div class="spinner"></div> กำลังโหลด...</div></div>
<script>
const SUPABASE_URL='YOUR_SUPABASE_URL';
const SUPABASE_KEY='YOUR_ANON_KEY';
if(SUPABASE_URL==='YOUR_SUPABASE_URL'||SUPABASE_KEY==='YOUR_ANON_KEY'){document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px"><div style="background:#fff;border-radius:20px;padding:32px 24px;max-width:440px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06)"><div style="font-size:48px;margin-bottom:12px">⚙️</div><h2 style="font-size:18px;font-weight:700;margin-bottom:8px">ตั้งค่า Supabase ก่อนใช้งาน</h2><p style="color:#64748b;font-size:13px;line-height:1.8">เปิด index.html ด้วย Notepad<br>หา <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px">YOUR_SUPABASE_URL</code> และ <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:12px">YOUR_ANON_KEY</code><br>แทนที่ด้วยค่าจาก Supabase Dashboard</p></div></div>`;throw new Error('Config')}
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const CATS=[{id:"electrical",l:"ไฟฟ้า",i:"⚡",d:"หลอดไฟ สวิตช์ ปลั๊ก"},{id:"plumbing",l:"ประปา",i:"🚿",d:"ท่อน้ำ ก๊อก สุขภัณฑ์"},{id:"aircon",l:"แอร์",i:"❄️",d:"ปรับอากาศ พัดลม"},{id:"structure",l:"โครงสร้าง",i:"🧱",d:"ผนัง พื้น ประตู"},{id:"furniture",l:"เฟอร์นิเจอร์",i:"🪑",d:"โต๊ะ เก้าอี้ ตู้"},{id:"network",l:"IT",i:"🌐",d:"เน็ต คอม ปริ้นเตอร์"},{id:"elevator",l:"ลิฟต์",i:"🛗",d:"ลิฟต์โดยสาร"},{id:"cleaning",l:"ความสะอาด",i:"🧹",d:"ทำความสะอาด"},{id:"other",l:"อื่นๆ",i:"📋",d:"งานซ่อมอื่นๆ"}];
const URG=[{id:"low",l:"ปกติ",c:"#16a34a",bg:"#f0fdf4",bd:"#bbf7d0"},{id:"medium",l:"เร่งด่วน",c:"#d97706",bg:"#fffbeb",bd:"#fde68a"},{id:"high",l:"ฉุกเฉิน",c:"#dc2626",bg:"#fef2f2",bd:"#fecaca"}];
const STS=[{id:"pending",l:"รอรับเรื่อง",c:"#d97706",bg:"#fffbeb",i:"⏳"},{id:"accepted",l:"รับเรื่องแล้ว",c:"#7c3aed",bg:"#f5f3ff",i:"📋"},{id:"in_progress",l:"กำลังซ่อม",c:"#2563eb",bg:"#eff6ff",i:"🔧"},{id:"completed",l:"เสร็จสิ้น",c:"#16a34a",bg:"#f0fdf4",i:"✅"},{id:"cancelled",l:"ยกเลิก",c:"#94a3b8",bg:"#f8fafc",i:"✖️"}];
const SM={};STS.forEach(s=>SM[s.id]=s);
const LOCS=["อาคาร A","อาคาร B","อาคาร C","อาคาร D","อาคารจอดรถ","ส่วนกลาง","โรงอาหาร","ห้องประชุมใหญ่"];
const APASS="admin1234";

let $={v:"home",rq:[],sel:null,sr:"",fS:"all",fC:"all",adm:false,showAM:false,ap:"",ld:false,
  fm:{title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""},
  imgs:[],imgPreviews:[],uploadProg:0,lightbox:null,toast:null};

function gt(){const d=new Date();return`MR${String(d.getFullYear()).slice(-2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.floor(Math.random()*10000)).padStart(4,"0")}`}
function fd(d){return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"})}
function fdt(d){return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function gc(id){return CATS.find(c=>c.id===id)}
function gu(id){return URG.find(u=>u.id===id)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(m,t="ok"){$.toast={m,t};R();setTimeout(()=>{$.toast=null;R()},3000)}
function nav(v){$.v=v;$.sel=null;$.showAM=false;$.lightbox=null;window.scrollTo(0,0);R()}
function st(){return{total:$.rq.length,pend:$.rq.filter(r=>r.status==="pending").length,acc:$.rq.filter(r=>r.status==="accepted").length,ip:$.rq.filter(r=>r.status==="in_progress").length,done:$.rq.filter(r=>r.status==="completed").length}}
function filt(){return $.rq.filter(r=>{if($.fS!=="all"&&r.status!==$.fS)return false;if($.fC!=="all"&&r.category!==$.fC)return false;if($.sr){const s=$.sr.toLowerCase();return[r.title,r.reporter,r.id,r.department,r.location].some(v=>(v||"").toLowerCase().includes(s))}return true})}

// ── IMAGE HANDLING ──
function resizeImg(file,maxW=1200){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>maxW){h=h*(maxW/w);w=maxW}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>res(b),'image/jpeg',0.8)};img.src=e.target.result};r.readAsDataURL(file)})}

function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    if($.imgs.length>=5){toast("แนบได้สูงสุด 5 รูป","err");return}
    const url=URL.createObjectURL(f);
    $.imgs.push(f);
    $.imgPreviews.push(url);
  });
  R();
}

function removeImg(i){
  URL.revokeObjectURL($.imgPreviews[i]);
  $.imgs.splice(i,1);$.imgPreviews.splice(i,1);R();
}

async function uploadImages(ticketId){
  const urls=[];
  for(let i=0;i<$.imgs.length;i++){
    $.uploadProg=Math.round((i/$.imgs.length)*100);R();
    const resized=await resizeImg($.imgs[i]);
    const fname=`${ticketId}/${Date.now()}_${i}.jpg`;
    const{error}=await sb.storage.from('maintenance-images').upload(fname,resized,{contentType:'image/jpeg'});
    if(!error){
      const{data}=sb.storage.from('maintenance-images').getPublicUrl(fname);
      if(data?.publicUrl)urls.push(data.publicUrl);
    }
  }
  $.uploadProg=100;R();
  return urls;
}

// ── SUPABASE ──
async function load(){const{data}=await sb.from('maintenance_requests').select('*').order('created_at',{ascending:false});if(data)$.rq=data.map(r=>({...r,createdAt:r.created_at,updatedAt:r.updated_at,adminNote:r.admin_note||'',history:r.history||[],images:r.images||[]}));R()}

async function doSubmit(){
  const f=$.fm;
  if(!f.title||!f.category||!f.location||!f.reporter||!f.department){toast("กรุณากรอกข้อมูลที่จำเป็นให้ครบ","err");return}
  const id=gt(),now=new Date().toISOString(),hist=[{status:"pending",at:now,note:"แจ้งซ่อมใหม่"}];
  $.ld=true;R();
  let imgUrls=[];
  if($.imgs.length>0)imgUrls=await uploadImages(id);
  const{error}=await sb.from('maintenance_requests').insert({id,title:f.title,category:f.category,urgency:f.urgency,status:"pending",location:f.location,floor:f.floor,room:f.room,description:f.description,reporter:f.reporter,department:f.department,phone:f.phone,email:f.email,admin_note:"",images:imgUrls,history:hist,created_at:now,updated_at:now});
  $.ld=false;$.uploadProg=0;
  if(error){toast("เกิดข้อผิดพลาด","err");R();return}
  $.rq.unshift({...f,id,status:"pending",createdAt:now,updatedAt:now,history:hist,adminNote:"",images:imgUrls});
  $.fm={title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""};
  $.imgs=[];$.imgPreviews.forEach(u=>URL.revokeObjectURL(u));$.imgPreviews=[];
  $.sel=id;$.v="success";R();
}
