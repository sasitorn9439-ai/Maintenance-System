<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแจ้งซ่อมออนไลน์</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
body { font-family: sans-serif; background:#f1f5f9; color:#334155; margin:0; padding:0;}
#app { max-width:680px; margin:20px auto; }
input, select, textarea, button { font-size:16px; padding:8px; margin:4px 0; width:100%; }
button { cursor:pointer; background:#6366f1; color:#fff; border:none; border-radius:8px; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:8px; display:none;}
.img-preview { display:inline-block; width:60px; height:60px; margin:4px; object-fit:cover; border:1px solid #ccc; border-radius:8px;}
</style>
</head>
<body>

<div id="app">
  <h2>แจ้งซ่อมออนไลน์</h2>

  <label>หัวข้อ:</label>
  <input id="title" placeholder="หัวข้อเรื่องซ่อม">

  <label>หมวดหมู่:</label>
  <select id="category">
    <option value="electrical">ไฟฟ้า ⚡</option>
    <option value="plumbing">ประปา 🚿</option>
    <option value="aircon">แอร์ ❄️</option>
    <option value="structure">โครงสร้าง 🧱</option>
    <option value="furniture">เฟอร์นิเจอร์ 🪑</option>
    <option value="other">อื่นๆ 📋</option>
  </select>

  <label>สถานที่:</label>
  <input id="location" placeholder="อาคาร A, อาคาร B...">

  <label>ผู้แจ้ง:</label>
  <input id="reporter" placeholder="ชื่อผู้แจ้ง">

  <label>รายละเอียด:</label>
  <textarea id="description" placeholder="รายละเอียดเพิ่มเติม"></textarea>

  <label>แนบรูป (สูงสุด 5 รูป):</label>
  <input type="file" id="images" multiple accept="image/*">
  <div id="imgPreview"></div>

  <button id="submitBtn">ส่งเรื่องแจ้งซ่อม</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://qxokalkgvethzgehmdaz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4b2thbGtndmV0aHpnZWhtZGF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTc2NDgsImV4cCI6MjA5MDc3MzY0OH0.0bcK4J0JgQufzp38kfyo3oGupQSfsYQ7tKfaCDMlUiU';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let imgs = [];

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(()=>t.style.display='none',3000);
}

// preview image
document.getElementById('images').addEventListener('change', e=>{
  const files = Array.from(e.target.files);
  const preview = document.getElementById('imgPreview');
  preview.innerHTML = '';
  imgs = [];
  files.slice(0,5).forEach(f=>{
    const url = URL.createObjectURL(f);
    imgs.push(f);
    const imgEl = document.createElement('img');
    imgEl.src = url;
    imgEl.className = 'img-preview';
    preview.appendChild(imgEl);
  });
});

// resize image
function resizeImg(file, maxW=1200){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        let w=img.width, h=img.height;
        if(w>maxW){ h=h*(maxW/w); w=maxW;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(b=>res(b), 'image/jpeg', 0.8);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// upload images to Supabase Storage
async function uploadImages(ticketId){
  const urls = [];
  for(let i=0;i<imgs.length;i++){
    const resized = await resizeImg(imgs[i]);
    const fname = `${ticketId}/${Date.now()}_${i}.jpg`;
    const {error} = await sb.storage.from('maintenance-images').upload(fname, resized, {contentType:'image/jpeg'});
    if(!error){
      const {data} = sb.storage.from('maintenance-images').getPublicUrl(fname);
      if(data?.publicUrl) urls.push(data.publicUrl);
    }
  }
  return urls;
}

// submit form
document.getElementById('submitBtn').addEventListener('click', async ()=>{
  const f = {
    title: document.getElementById('title').value,
    category: document.getElementById('category').value,
    location: document.getElementById('location').value,
    reporter: document.getElementById('reporter').value,
    description: document.getElementById('description').value
  };
  if(!f.title || !f.category || !f.location || !f.reporter){
    showToast('กรุณากรอกข้อมูลให้ครบ');
    return;
  }

  const ticketId = 'MR' + Date.now();
  let imgUrls = [];
  if(imgs.length>0){
    imgUrls = await uploadImages(ticketId);
  }

  const {error} = await sb.from('maintenance_requests').insert([{
    id: ticketId,
    title: f.title,
    category: f.category,
    location: f.location,
    reporter: f.reporter,
    description: f.description,
    status: 'pending',
    images: imgUrls,
    created_at: new Date()
  }]);

  if(error){
    console.error(error);
    showToast('เกิดข้อผิดพลาด');
  } else {
    showToast('ส่งเรื่องเรียบร้อยแล้ว');
    document.getElementById('app').reset && document.getElementById('app').reset();
    document.getElementById('imgPreview').innerHTML='';
    imgs = [];
  }
});
</script>

</body>
</html>
