<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans Thai',sans-serif;background:#f8fafc;color:#334155;min-height:100vh}input,select,textarea,button{font-family:inherit}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}@keyframes popIn{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}.anim-up{animation:fadeUp .4s ease-out both}.anim-pop{animation:popIn .4s ease-out both}

.main{flex:1;min-width:0}.content{padding:28px 32px;max-width:920px;margin:0 auto}.mobile-header{display:none;position:sticky;top:0;z-index:100;background:#0f172a;color:#fff;align-items:center;justify-content:space-between;padding:12px 16px}.hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;width:36px}.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}

.hero-banner{background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:48px 24px;margin-bottom:28px;color:#fff;text-align:center}.hero-title{font-size:26px;font-weight:800}.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}.home-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:28px 16px;background:#fff;border-radius:16px;border:2px solid #f1f5f9;cursor:pointer;transition:all .2s;text-align:center}.home-card:hover{border-color:#c7d2fe;box-shadow:0 4px 16px rgba(99,102,241,.1)}.home-stats{display:flex;justify-content:center;gap:32px;padding:20px 0}

.success-card{background:#fff;border-radius:20px;padding:40px 36px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.06);max-width:420px;margin:40px auto}.ticket-box{background:#f8fafc;border-radius:14px;padding:18px 28px;margin:8px 0 16px;border:2px dashed #e2e8f0;text-align:center}

.stats-grid,.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}.stat-card{border-radius:16px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}.cat-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}.cat-sum-card{background:#fff;border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid #f1f5f9}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;animation:fadeUp .3s ease-out;box-shadow:0 4px 16px rgba(0,0,0,.1)}.back-link{background:none;border:none;color:#6366f1;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:14px;padding:0}.admin-input{font-size:13px;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;width:100%}.admin-input::placeholder{color:#64748b}.loading-spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;border-top:2px solid #6366f1;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.realtime-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;display:inline-block;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>

<script>
// ╔══════════════════════════════════════════╗
// ║  ★ ใส่ค่า Supabase ของคุณตรงนี้ ★        ║

const SUPABASE_URL='https://qxokalkgvethzgehmdaz.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4b2thbGtndmV0aHpnZWhtZGF6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxOTc2NDgsImV4cCI6MjA5MDc3MzY0OH0.0bcK4J0JgQufzp38kfyo3oGupQSfsYQ7tKfaCDMlUiU';

if(SUPABASE_URL==='YOUR_SUPABASE_URL'||SUPABASE_KEY==='YOUR_ANON_KEY'){document.getElementById('app').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div style="background:#fff;border-radius:20px;padding:40px;max-width:520px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.06)"><div style="font-size:48px;margin-bottom:12px">⚙️</div><h2 style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:8px">ตั้งค่า Supabase ก่อนใช้งาน</h2><p style="color:#64748b;font-size:14px;line-height:1.8;margin-bottom:16px">เปิดไฟล์ <b>index.html</b> ด้วย Notepad<br>หาบรรทัด <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">YOUR_SUPABASE_URL</code> และ <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">YOUR_ANON_KEY</code><br>แล้วแทนที่ด้วยค่าจาก Supabase Dashboard</p><div style="background:#f8fafc;border-radius:12px;padding:16px;text-align:left;font-size:13px;line-height:1.8;color:#475569"><b>วิธีหาค่า:</b><br>1. เข้า <a href="https://supabase.com" target="_blank" style="color:#6366f1">supabase.com</a> → สร้างโปรเจกต์<br>2. ไป SQL Editor → วาง SQL → กด Run<br>3. ไป Settings → API<br>4. Copy <b>Project URL</b> วางแทน YOUR_SUPABASE_URL<br>5. Copy <b>anon public</b> วางแทน YOUR_ANON_KEY</div></div></div>`;throw new Error('Config needed')}

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const CATEGORIES=[{id:"electrical",label:"ไฟฟ้า",icon:"⚡",desc:"หลอดไฟ สวิตช์ ปลั๊ก"},{id:"plumbing",label:"ประปา",icon:"🚿",desc:"ท่อน้ำ ก๊อก สุขภัณฑ์"},{id:"aircon",label:"แอร์",icon:"❄️",desc:"เครื่องปรับอากาศ พัดลม"},{id:"structure",label:"โครงสร้าง",icon:"🧱",desc:"ผนัง พื้น ประตู หน้าต่าง"},{id:"furniture",label:"เฟอร์นิเจอร์",icon:"🪑",desc:"โต๊ะ เก้าอี้ ตู้"},{id:"network",label:"IT/เครือข่าย",icon:"🌐",desc:"อินเทอร์เน็ต คอม"},{id:"elevator",label:"ลิฟต์",icon:"🛗",desc:"ลิฟต์โดยสาร"},{id:"cleaning",label:"ความสะอาด",icon:"🧹",desc:"ทำความสะอาด"},{id:"other",label:"อื่นๆ",icon:"📋",desc:"งานซ่อมอื่นๆ"}];
const URGENCY=[{id:"low",label:"ปกติ",color:"#16a34a",bg:"#f0fdf4",border:"#bbf7d0"},{id:"medium",label:"เร่งด่วน",color:"#d97706",bg:"#fffbeb",border:"#fde68a"},{id:"high",label:"ฉุกเฉิน",color:"#dc2626",bg:"#fef2f2",border:"#fecaca"}];
const STATUSES=[{id:"pending",label:"รอรับเรื่อง",color:"#d97706",bg:"#fffbeb",icon:"⏳"},{id:"accepted",label:"รับเรื่องแล้ว",color:"#7c3aed",bg:"#f5f3ff",icon:"📋"},{id:"in_progress",label:"กำลังซ่อม",color:"#2563eb",bg:"#eff6ff",icon:"🔧"},{id:"completed",label:"เสร็จสิ้น",color:"#16a34a",bg:"#f0fdf4",icon:"✅"},{id:"cancelled",label:"ยกเลิก",color:"#94a3b8",bg:"#f8fafc",icon:"✖️"}];
const SM={};STATUSES.forEach(s=>SM[s.id]=s);
const LOCS=["อาคาร 1","อาคาร 2","อาคาร 3","อาคาร 4","อาคาร 5","อาคาร 6","อาคาร 7","ส่วนกลาง","โรงอาหาร"];
const ADMIN_PASS="admin1234";
let S={view:"home",reqs:[],sel:null,search:"",fS:"all",fC:"all",isAdmin:false,showAL:false,ap:"",sideOpen:false,loading:false,form:{title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""},toast:null};
function gt(){const d=new Date();return`MR${String(d.getFullYear()).slice(-2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.floor(Math.random()*10000)).padStart(4,"0")}`}
function fd(d){return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"})}
function fdt(d){return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function gc(id){return CATEGORIES.find(c=>c.id===id)}
function gu(id){return URGENCY.find(u=>u.id===id)}
function e(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function toast(m,t="success"){S.toast={msg:m,type:t};R();setTimeout(()=>{S.toast=null;R()},3000)}
function nav(v){S.view=v;S.sideOpen=false;S.sel=null;R()}
function stats(){return{total:S.reqs.length,pending:S.reqs.filter(r=>r.status==="pending").length,accepted:S.reqs.filter(r=>r.status==="accepted").length,ip:S.reqs.filter(r=>r.status==="in_progress").length,done:S.reqs.filter(r=>r.status==="completed").length}}
function filtered(){return S.reqs.filter(r=>{if(S.fS!=="all"&&r.status!==S.fS)return false;if(S.fC!=="all"&&r.category!==S.fC)return false;if(S.search){const s=S.search.toLowerCase();return[r.title,r.reporter,r.id,r.department,r.location].some(v=>(v||"").toLowerCase().includes(s))}return true})}

async function load(){const{data}=await sb.from('maintenance_requests').select('*').order('created_at',{ascending:false});if(data)S.reqs=data.map(r=>({...r,createdAt:r.created_at,updatedAt:r.updated_at,adminNote:r.admin_note||'',history:r.history||[]}));R()}
async function submit(){const f=S.form;if(!f.title||!f.category||!f.location||!f.reporter||!f.department){toast("กรุณากรอกข้อมูลที่จำเป็นให้ครบ","error");return}const id=gt(),now=new Date().toISOString(),hist=[{status:"pending",at:now,note:"แจ้งซ่อมใหม่"}];S.loading=true;R();const{error}=await sb.from('maintenance_requests').insert({id,title:f.title,category:f.category,urgency:f.urgency,status:"pending",location:f.location,floor:f.floor,room:f.room,description:f.description,reporter:f.reporter,department:f.department,phone:f.phone,email:f.email,admin_note:"",history:hist,created_at:now,updated_at:now});S.loading=false;if(error){toast("เกิดข้อผิดพลาด: "+error.message,"error");R();return}S.reqs.unshift({...f,id,status:"pending",createdAt:now,updatedAt:now,history:hist,adminNote:""});S.form={title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""};S.sel=id;S.view="success";R()}
async function upStatus(id,ns){const now=new Date().toISOString(),r=S.reqs.find(x=>x.id===id);if(!r)return;const nh=[...(r.history||[]),{status:ns,at:now,note:SM[ns]?.label}];const{error}=await sb.from('maintenance_requests').update({status:ns,history:nh,updated_at:now}).eq('id',id);if(!error){S.reqs=S.reqs.map(x=>x.id===id?{...x,status:ns,updatedAt:now,history:nh}:x);toast("อัปเดตสถานะเรียบร้อย")}else toast("เกิดข้อผิดพลาด","error")}
async function upNote(id,n){const{error}=await sb.from('maintenance_requests').update({admin_note:n,updated_at:new Date().toISOString()}).eq('id',id);if(!error){S.reqs=S.reqs.map(x=>x.id===id?{...x,adminNote:n}:x);toast("บันทึกเรียบร้อย")}else toast("เกิดข้อผิดพลาด","error")}

sb.channel('mc').on('postgres_changes',{event:'*',schema:'public',table:'maintenance_requests'},p=>{const r=p.new;const mapped={...r,createdAt:r.created_at,updatedAt:r.updated_at,adminNote:r.admin_note||'',history:r.history||[]};if(p.eventType==='INSERT'&&!S.reqs.find(x=>x.id===r.id)){S.reqs.unshift(mapped);R()}else if(p.eventType==='UPDATE'){S.reqs=S.reqs.map(x=>x.id===r.id?{...x,...mapped}:x);R()}}).subscribe();

function tryAL(){if(S.ap===ADMIN_PASS){S.isAdmin=true;S.showAL=false;R()}else toast("รหัสไม่ถูกต้อง","error")}

function R(){
const app=document.getElementById('app'),st=stats(),isMob=window.innerWidth<768;let h='';
h+=`<div class="mobile-header"><button class="hamburger" onclick="S.sideOpen=!S.sideOpen;R()">☰</button><span style="font-weight:700;font-size:16px">🔧 ระบบแจ้งซ่อม</span><div style="width:36px"></div></div>`;
h+=`<div class="overlay ${S.sideOpen?'show':''}" onclick="S.sideOpen=false;R()"></div>`;
h+=`<div class="sidebar ${S.sideOpen?'open':''}">`;
if(!isMob)h+=`<div class="sidebar-logo"><div class="logo-circle">🔧</div><div><div style="font-weight:700;font-size:15px">ระบบแจ้งซ่อม</div><div style="font-size:11px;color:#94a3b8">Maintenance System</div></div></div>`;
h+=`<div class="nav-section"><div class="nav-label">พนักงาน</div><button class="nav-btn ${S.view==='home'?'active':''}" onclick="nav('home')">🏠 หน้าหลัก</button><button class="nav-btn ${S.view==='form'?'active':''}" onclick="nav('form')">📝 แจ้งซ่อมใหม่</button><button class="nav-btn ${S.view==='track'||S.view==='detail'&&!S.isAdmin?'active':''}" onclick="nav('track')">🔍 ติดตามสถานะ</button></div>`;
if(S.isAdmin)h+=`<div class="nav-section"><div class="nav-label">ผู้ดูแล</div><button class="nav-btn ${S.view==='admin_dash'?'active':''}" onclick="nav('admin_dash')">📊 แดชบอร์ด</button><button class="nav-btn ${S.view==='admin_list'?'active':''}" onclick="nav('admin_list')">🛠️ จัดการรายการ ${st.pending>0?`<span class="nav-badge">${st.pending}</span>`:''}</button></div>`;
h+=`<div class="sidebar-bottom"><div style="font-size:11px;color:#475569;margin-bottom:8px;display:flex;align-items:center;gap:6px"><div class="realtime-dot"></div> Realtime</div>`;
if(!S.isAdmin){if(S.showAL)h+=`<div style="display:flex;flex-direction:column;gap:6px"><input type="password" class="admin-input" placeholder="รหัสผู้ดูแล" value="${e(S.ap)}" oninput="S.ap=this.value" onkeydown="if(event.key==='Enter')tryAL()"><div style="display:flex;gap:4px"><button class="sm-btn" style="flex:1;background:#6366f1;color:#fff;border:none;font-size:12px;padding:6px 0" onclick="tryAL()">เข้าสู่ระบบ</button><button class="sm-btn" style="background:transparent;color:#94a3b8;border:1px solid rgba(255,255,255,.1);font-size:12px;padding:6px 10px" onclick="S.showAL=false;R()">✕</button></div><div style="font-size:11px;color:#64748b">รหัสเริ่มต้น: admin1234</div></div>`;else h+=`<button class="nav-btn" style="font-size:13px;color:#64748b" onclick="S.showAL=true;R()">🔐 เข้าระบบผู้ดูแล</button>`}else h+=`<button class="nav-btn" style="font-size:13px;color:#64748b" onclick="S.isAdmin=false;S.ap='';nav('home')">🚪 ออกจากระบบผู้ดูแล</button>`;
h+=`</div></div><div class="main"><div class="content">`;

if(S.view==="home")h+=`<div class="anim-up" style="text-align:center"><div class="hero-banner"><div style="font-size:48px;margin-bottom:8px">🔧</div><h1 class="hero-title">ระบบแจ้งซ่อมออนไลน์</h1><p style="font-size:15px;color:#94a3b8;margin-top:6px">แจ้งปัญหา ติดตามสถานะ ได้ทุกที่ทุกเวลา<br><span style="font-size:12px">ข้อมูลซิงก์แบบเรียลไทม์ทุกเครื่อง</span></p></div><div class="home-grid"><button class="home-card" onclick="nav('form')"><span style="font-size:36px">📝</span><span style="font-size:17px;font-weight:700;color:#0f172a">แจ้งซ่อมใหม่</span><span style="font-size:13px;color:#94a3b8">กรอกข้อมูลแจ้งปัญหา</span></button><button class="home-card" onclick="nav('track')"><span style="font-size:36px">🔍</span><span style="font-size:17px;font-weight:700;color:#0f172a">ติดตามสถานะ</span><span style="font-size:13px;color:#94a3b8">ค้นหาเลขที่ / ดูรายการ</span></button></div><div class="home-stats"><div><div style="font-size:28px;font-weight:800;color:#d97706">${st.pending}</div><div style="font-size:13px;color:#64748b">รอรับเรื่อง</div></div><div><div style="font-size:28px;font-weight:800;color:#2563eb">${st.ip+st.accepted}</div><div style="font-size:13px;color:#64748b">กำลังซ่อม</div></div><div><div style="font-size:28px;font-weight:800;color:#16a34a">${st.done}</div><div style="font-size:13px;color:#64748b">เสร็จแล้ว</div></div></div></div>`;

if(S.view==="form"){const f=S.form;h+=`<div class="anim-up"><div class="form-card"><h2 style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px">📝 แจ้งซ่อมใหม่</h2><p style="color:#94a3b8;font-size:14px;margin-bottom:20px">กรอกรายละเอียดให้ครบถ้วน</p><div class="section-label">ประเภทงานซ่อม <span style="color:#ef4444">*</span></div><div class="cat-grid">${CATEGORIES.map(c=>`<button class="cat-btn ${f.category===c.id?'active':''}" onclick="S.form.category='${c.id}';R()"><span style="font-size:22px">${c.icon}</span><span style="font-weight:600">${c.label}</span><span style="font-size:11px;color:${f.category===c.id?'#818cf8':'#94a3b8'};line-height:1.2">${c.desc}</span></button>`).join('')}</div><div class="section-label">ข้อมูลปัญหา <span style="color:#ef4444">*</span></div><div style="margin-bottom:12px"><label class="field-label">หัวข้อ *</label><input class="input" value="${e(f.title)}" oninput="S.form.title=this.value" placeholder="เช่น หลอดไฟเสีย, แอร์ไม่เย็น"></div><div class="form-row"><div style="flex:2;min-width:180px"><label class="field-label">สถานที่ *</label><select class="input" onchange="S.form.location=this.value;R()"><option value="" ${!f.location?'selected':''}>-- เลือก --</option>${LOCS.map(l=>`<option ${f.location===l?'selected':''}>${l}</option>`).join('')}</select></div><div style="flex:1;min-width:80px"><label class="field-label">ชั้น</label><input class="input" value="${e(f.floor)}" oninput="S.form.floor=this.value" placeholder="3"></div><div style="flex:1;min-width:100px"><label class="field-label">ห้อง</label><input class="input" value="${e(f.room)}" oninput="S.form.room=this.value" placeholder="301"></div></div><div style="margin-top:12px"><label class="field-label">รายละเอียด</label><textarea class="input" style="min-height:90px;resize:vertical" oninput="S.form.description=this.value" placeholder="อธิบายอาการ...">${e(f.description)}</textarea></div><div style="margin-top:12px"><label class="field-label">ความเร่งด่วน</label><div style="display:flex;gap:10px">${URGENCY.map(u=>`<button class="urg-btn" style="color:${u.color};background:${f.urgency===u.id?u.bg:'#fff'};border:2px solid ${f.urgency===u.id?u.color:'#e2e8f0'};font-weight:${f.urgency===u.id?700:400}" onclick="S.form.urgency='${u.id}';R()">${u.label}</button>`).join('')}</div></div><div class="section-label">ข้อมูลผู้แจ้ง <span style="color:#ef4444">*</span></div><div class="form-row"><div style="flex:1;min-width:160px"><label class="field-label">ชื่อ-นามสกุล *</label><input class="input" value="${e(f.reporter)}" oninput="S.form.reporter=this.value" placeholder="ชื่อจริง นามสกุล"></div><div style="flex:1;min-width:160px"><label class="field-label">แผนก *</label><input class="input" value="${e(f.department)}" oninput="S.form.department=this.value" placeholder="เช่น ฝ่ายบัญชี"></div></div><div class="form-row"><div style="flex:1;min-width:160px"><label class="field-label">เบอร์โทร</label><input class="input" value="${e(f.phone)}" oninput="S.form.phone=this.value" placeholder="08X-XXX-XXXX"></div><div style="flex:1;min-width:160px"><label class="field-label">อีเมล</label><input class="input" value="${e(f.email)}" oninput="S.form.email=this.value" placeholder="email@company.com"></div></div><button class="submit-btn" onclick="submit()" ${(!f.title||!f.category||!f.location||!f.reporter||!f.department||S.loading)?'disabled':''}>${S.loading?'<span class="loading-spinner" style="width:16px;height:16px;border-width:2px;vertical-align:middle;margin-right:8px"></span> กำลังส่ง...':'📤 ส่งแจ้งซ่อม'}</button></div></div>`}

if(S.view==="success")h+=`<div class="anim-pop"><div class="success-card"><div style="font-size:56px">✅</div><h2 style="color:#16a34a;font-size:22px">แจ้งซ่อมสำเร็จ!</h2><p style="color:#64748b">บันทึกเรียบร้อย ทุกคนเห็นรายการนี้แล้ว</p><div class="ticket-box"><div style="font-size:12px;color:#94a3b8;font-weight:600">เลขที่แจ้งซ่อม</div><div style="font-size:28px;font-weight:800;color:#6366f1;letter-spacing:1px">${S.sel||''}</div></div><div style="display:flex;gap:10px"><button class="sm-btn" style="background:#f1f5f9;color:#334155;border:none;padding:10px 20px" onclick="nav('form')">+ แจ้งเพิ่ม</button><button class="sm-btn" style="background:#6366f1;color:#fff;border:none;padding:10px 20px" onclick="S.view='detail';R()">ดูรายละเอียด →</button></div></div></div>`;

if(S.view==="track"||S.view==="admin_list"){const isA=S.view==="admin_list",items=filtered();h+=`<div class="anim-up"><div style="margin-bottom:16px"><h2 style="font-size:18px;font-weight:700">${isA?'🛠️ จัดการรายการ':'ติดตามสถานะ'}</h2><div style="color:#94a3b8;font-size:13px">${isA?`ทั้งหมด ${S.reqs.length} · รอ ${st.pending}`:'ค้นจากเลขที่ ชื่อ หรือสถานที่'}</div></div><div class="filter-bar"><input class="input" style="flex:1;max-width:260px" value="${e(S.search)}" oninput="S.search=this.value;R()" placeholder="🔍 ค้นหา..."><select class="input" style="width:auto;min-width:140px" onchange="S.fS=this.value;R()"><option value="all">ทุกสถานะ</option>${STATUSES.map(s=>`<option value="${s.id}" ${S.fS===s.id?'selected':''}>${s.icon} ${s.label}</option>`).join('')}</select><select class="input" style="width:auto;min-width:140px" onchange="S.fC=this.value;R()"><option value="all">ทุกประเภท</option>${CATEGORIES.map(c=>`<option value="${c.id}" ${S.fC===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}</select><button class="sm-btn" style="background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;padding:8px 14px" onclick="load()">🔄</button></div>`;if(!items.length)h+=`<div style="text-align:center;padding:48px;color:#94a3b8"><div style="font-size:40px">📭</div><div style="margin-top:8px">ไม่พบรายการ</div></div>`;else items.forEach((r,i)=>{const c=gc(r.category),s=SM[r.status],u=gu(r.urgency);h+=`<div class="list-row anim-up" style="animation-delay:${i*.04}s" onclick="S.sel='${r.id}';S.view='detail';R()"><div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1"><div class="list-icon">${c?.icon||''}</div><div style="min-width:0"><div style="font-weight:600;color:#0f172a;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e(r.title)}</div><div style="font-size:12px;color:#94a3b8;margin-top:2px">${e(r.id)} · ${e(r.location)}${isA?' · '+e(r.department):''}</div></div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">${u?.id!=='low'?`<span class="pill-sm" style="color:${u.color};background:${u.bg}">${u.label}</span>`:''}<span class="pill-sm" style="color:${s?.color};background:${s?.bg}">${s?.icon} ${s?.label}</span><span style="font-size:12px;color:#cbd5e1">${fd(r.createdAt)}</span></div></div>`});h+=`</div>`}

if(S.view==="detail"){const r=S.reqs.find(x=>x.id===S.sel);if(r){const c=gc(r.category),s=SM[r.status],u=gu(r.urgency);h+=`<div class="anim-up"><button class="back-link" onclick="nav('${S.isAdmin?'admin_list':'track'}')">← ย้อนกลับ</button><div class="detail-card"><div class="detail-top"><div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:28px">${c?.icon}</span><h2 style="font-size:20px;font-weight:700;color:#0f172a">${e(r.title)}</h2></div><div style="color:#94a3b8;font-size:13px;margin-top:4px">เลขที่ <b style="color:#6366f1">${r.id}</b> · ${fdt(r.createdAt)}</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill" style="background:${u?.bg};color:${u?.color};border:1px solid ${u?.border}">${u?.label}</span><span class="pill" style="background:${s?.bg};color:${s?.color}">${s?.icon} ${s?.label}</span></div></div><div class="detail-grid"><div><div class="detail-field-label">สถานที่</div><div class="detail-field-val">${e(r.location)}${r.floor?' ชั้น '+e(r.floor):''}${r.room?' ห้อง '+e(r.room):''}</div></div><div><div class="detail-field-label">ประเภท</div><div class="detail-field-val">${c?.icon} ${c?.label}</div></div><div><div class="detail-field-label">ผู้แจ้ง</div><div class="detail-field-val">${e(r.reporter)}</div></div><div><div class="detail-field-label">แผนก</div><div class="detail-field-val">${e(r.department)}</div></div><div><div class="detail-field-label">โทรศัพท์</div><div class="detail-field-val">${e(r.phone)||'-'}</div></div><div><div class="detail-field-label">อีเมล</div><div class="detail-field-val">${e(r.email)||'-'}</div></div></div>${r.description?`<div style="margin-top:20px"><div class="detail-field-label">รายละเอียด</div><div style="background:#f8fafc;border-radius:10px;padding:14px 16px;line-height:1.8;color:#334155;font-size:14px;margin-top:4px;white-space:pre-wrap">${e(r.description)}</div></div>`:''}${r.adminNote&&!S.isAdmin?`<div style="margin-top:20px"><div class="detail-field-label">หมายเหตุจากช่าง</div><div style="background:#eff6ff;border-radius:10px;padding:14px 16px;line-height:1.8;color:#1e40af;font-size:14px;margin-top:4px;white-space:pre-wrap">${e(r.adminNote)}</div></div>`:''}`;
h+=`<div style="margin-top:28px;border-top:1px solid #f1f5f9;padding-top:20px"><div class="detail-field-label" style="margin-bottom:12px;font-size:13px">ประวัติสถานะ</div>${(r.history||[]).map((hh,i)=>{const hs=SM[hh.status];return`<div style="display:flex;gap:14px;padding-bottom:${i<r.history.length-1?'20px':'0'}"><div style="display:flex;flex-direction:column;align-items:center"><div style="width:10px;height:10px;border-radius:50%;background:${hs?.color||'#94a3b8'};flex-shrink:0;margin-top:5px"></div>${i<r.history.length-1?'<div style="width:2px;flex:1;background:#e2e8f0;margin-top:4px"></div>':''}</div><div><div style="font-weight:600;font-size:14px;color:${hs?.color}">${hs?.icon} ${hs?.label}</div><div style="font-size:12px;color:#94a3b8">${fdt(hh.at)}${hh.note&&hh.note!==hs?.label?' — '+e(hh.note):''}</div></div></div>`}).join('')}</div>`;
if(S.isAdmin)h+=`<div style="margin-top:28px;border-top:1px solid #f1f5f9;padding-top:20px"><div class="detail-field-label" style="margin-bottom:10px">จัดการ (ผู้ดูแล)</div><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">${STATUSES.map(ss=>`<button class="sm-btn" style="background:${r.status===ss.id?ss.bg:'#fff'};color:${ss.color};border:1.5px solid ${r.status===ss.id?ss.color:'#e2e8f0'};opacity:${r.status===ss.id?.6:1}" ${r.status===ss.id?'disabled':''} onclick="upStatus('${r.id}','${ss.id}')">${ss.icon} ${ss.label}</button>`).join('')}</div><div class="detail-field-label" style="margin-bottom:6px">หมายเหตุช่าง</div><textarea class="input" id="anInput" style="min-height:70px;resize:vertical" placeholder="บันทึกเพิ่มเติม...">${e(r.adminNote||'')}</textarea><button class="sm-btn" style="background:#6366f1;color:#fff;border:none;margin-top:8px;padding:8px 20px" onclick="upNote('${r.id}',document.getElementById('anInput').value)">💾 บันทึก</button></div>`;
h+=`</div></div>`}}

if(S.view==="admin_dash"&&S.isAdmin)h+=`<div class="anim-up"><h2 style="font-size:18px;font-weight:700;margin-bottom:20px">📊 แดชบอร์ด</h2><div class="dash-grid">${[{l:"ทั้งหมด",v:st.total,c:"#6366f1",bg:"#eef2ff",ic:"📊"},{l:"รอรับเรื่อง",v:st.pending,c:"#d97706",bg:"#fffbeb",ic:"⏳"},{l:"รับเรื่องแล้ว",v:st.accepted,c:"#7c3aed",bg:"#f5f3ff",ic:"📋"},{l:"กำลังซ่อม",v:st.ip,c:"#2563eb",bg:"#eff6ff",ic:"🔧"},{l:"เสร็จสิ้น",v:st.done,c:"#16a34a",bg:"#f0fdf4",ic:"✅"}].map((ss,i)=>`<div class="stat-card anim-pop" style="background:${ss.bg};animation-delay:${i*.08}s"><span style="font-size:28px">${ss.ic}</span><div style="font-size:32px;font-weight:800;color:${ss.c}">${ss.v}</div><div style="font-size:13px;color:#64748b">${ss.l}</div></div>`).join('')}</div><h3 style="font-size:15px;font-weight:700;margin:28px 0 12px">ตามประเภท</h3><div class="cat-summary">${CATEGORIES.map(cat=>{const cnt=S.reqs.filter(r=>r.category===cat.id).length,pend=S.reqs.filter(r=>r.category===cat.id&&(r.status==="pending"||r.status==="accepted")).length;return`<div class="cat-sum-card"><span style="font-size:20px">${cat.icon}</span><span style="font-weight:600;font-size:14px">${cat.label}</span><span style="font-size:18px;font-weight:700;color:#334155">${cnt}</span>${pend>0?`<span style="font-size:11px;color:#d97706;font-weight:600">รอ ${pend}</span>`:''}</div>`}).join('')}</div></div>`;

h+=`</div></div>`;
if(S.toast)h+=`<div class="toast" style="background:${S.toast.type==='error'?'#fef2f2':'#f0fdf4'};color:${S.toast.type==='error'?'#dc2626':'#16a34a'};border:1px solid ${S.toast.type==='error'?'#fecaca':'#bbf7d0'}">${S.toast.type==='error'?'⚠️':'✅'} ${e(S.toast.msg)}</div>`;
app.innerHTML=h}
load();window.addEventListener('resize',R);
</script>
