<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแจ้งซ่อมออนไลน์</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:#f8fafc;color:#334155;min-height:100vh}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.03)}100%{transform:scale(1);opacity:1}}
.anim-up{animation:fadeUp .4s ease-out both}
.anim-pop{animation:popIn .4s ease-out both}

.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;overflow-y:auto;z-index:50}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-circle{font-size:22px;width:38px;height:38px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center}
.nav-section{padding:14px 10px 4px}
.nav-label{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1px;padding:0 8px 6px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border:none;background:transparent;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;text-align:left;width:100%;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
.nav-btn.active{background:rgba(99,102,241,.15);color:#c7d2fe;font-weight:600}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:11px;font-weight:700;border-radius:10px;padding:1px 7px}
.sidebar-bottom{padding:12px 14px 18px;border-top:1px solid rgba(255,255,255,.06);margin-top:auto}

.main{flex:1;min-width:0}
.content{padding:28px 32px;max-width:920px;margin:0 auto}

/* Mobile */
.mobile-header{display:none;position:sticky;top:0;z-index:100;background:#0f172a;color:#fff;align-items:center;justify-content:space-between;padding:12px 16px}
.hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;width:36px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150}
@media(max-width:767px){
  .sidebar{position:fixed;top:0;left:0;z-index:200;height:100vh;transition:transform .25s ease;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mobile-header{display:flex}
  .overlay.show{display:block}
  .content{padding:16px}
  .hero-banner{padding:32px 16px!important}
  .hero-title{font-size:22px!important}
  .home-grid{grid-template-columns:1fr!important}
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .cat-grid{grid-template-columns:repeat(3,1fr)!important}
  .form-row{flex-direction:column!important}
  .filter-bar{flex-direction:column!important}
  .detail-top{flex-direction:column!important}
  .detail-grid{grid-template-columns:1fr!important}
  .dash-grid{grid-template-columns:1fr 1fr!important}
  .list-row-right{flex-direction:column;align-items:flex-end!important}
}

.hero-banner{background:linear-gradient(135deg,#1e293b,#334155);border-radius:20px;padding:48px 24px;margin-bottom:28px;color:#fff;text-align:center}
.hero-title{font-size:26px;font-weight:800}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.home-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:28px 16px;background:#fff;border-radius:16px;border:2px solid #f1f5f9;cursor:pointer;transition:all .2s;text-align:center}
.home-card:hover{border-color:#c7d2fe;box-shadow:0 4px 16px rgba(99,102,241,.1)}
.home-stats{display:flex;justify-content:center;gap:32px;padding:20px 0}

.form-card{background:#fff;border-radius:18px;padding:32px 28px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.section-label{font-size:15px;font-weight:700;color:#0f172a;margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
.field-label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:5px}
.input{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;color:#1e293b;background:#fff;transition:border .2s}
.input:focus{border-color:#818cf8}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.cat-btn{border:2px solid #e2e8f0;background:#f8fafc;border-radius:12px;padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;color:#64748b;text-align:center;font-size:13px}
.cat-btn.active{border-color:#6366f1;background:#eef2ff;color:#4f46e5}
.cat-btn:hover{border-color:#c7d2fe}
.urg-btn{padding:9px 22px;border-radius:10px;cursor:pointer;font-size:14px;transition:all .15s;flex:1;text-align:center}
.submit-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:28px;transition:opacity .2s}
.submit-btn:hover{opacity:.9}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

.form-row{display:flex;gap:12px;margin-top:4px}

.success-card{background:#fff;border-radius:20px;padding:40px 36px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.06);max-width:420px;margin:40px auto}
.ticket-box{background:#f8fafc;border-radius:14px;padding:18px 28px;margin:8px 0 16px;border:2px dashed #e2e8f0;text-align:center}

.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.list-row{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:13px 16px;border-radius:12px;cursor:pointer;transition:box-shadow .15s;border:1px solid #f1f5f9;margin-bottom:8px}
.list-row:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.list-icon{font-size:20px;width:38px;height:38px;background:#f1f5f9;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pill{font-size:13px;padding:4px 12px;border-radius:20px;font-weight:600;white-space:nowrap;display:inline-block}
.pill-sm{font-size:11px;padding:3px 8px;border-radius:14px;font-weight:600;white-space:nowrap;display:inline-block}

.detail-card{background:#fff;border-radius:18px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.detail-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid #f1f5f9}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px}
.detail-field-label{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.detail-field-val{font-size:14px;font-weight:500;color:#1e293b}

.sm-btn{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;display:inline-block}
.sm-btn:hover{opacity:.85}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.stat-card{border-radius:16px;padding:22px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.cat-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.cat-sum-card{background:#fff;border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid #f1f5f9}

.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.timeline-line{width:2px;flex:1;background:#e2e8f0;margin-top:4px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;animation:fadeUp .3s ease-out;box-shadow:0 4px 16px rgba(0,0,0,.1)}

.back-link{background:none;border:none;color:#6366f1;cursor:pointer;font-size:14px;font-weight:600;margin-bottom:14px;padding:0}
.admin-input{font-size:13px;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;width:100%}
.admin-input::placeholder{color:#64748b}

.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
</style>
</head>
<body>

<div id="app" class="app"></div>

<script>
// ─── DATA ───
const CATEGORIES = [
  {id:"electrical",label:"ไฟฟ้า",icon:"⚡",desc:"หลอดไฟ สวิตช์ ปลั๊ก สายไฟ"},
  {id:"plumbing",label:"ประปา",icon:"🚿",desc:"ท่อน้ำ ก๊อก สุขภัณฑ์"},
  {id:"aircon",label:"แอร์",icon:"❄️",desc:"เครื่องปรับอากาศ พัดลม"},
  {id:"structure",label:"โครงสร้าง",icon:"🧱",desc:"ผนัง พื้น ฝ้า ประตู หน้าต่าง"},
  {id:"furniture",label:"เฟอร์นิเจอร์",icon:"🪑",desc:"โต๊ะ เก้าอี้ ตู้ ชั้นวาง"},
  {id:"network",label:"IT/เครือข่าย",icon:"🌐",desc:"อินเทอร์เน็ต คอมพิวเตอร์"},
  {id:"elevator",label:"ลิฟต์",icon:"🛗",desc:"ลิฟต์โดยสาร ลิฟต์ขนของ"},
  {id:"cleaning",label:"ความสะอาด",icon:"🧹",desc:"ทำความสะอาด กำจัดสัตว์"},
  {id:"other",label:"อื่นๆ",icon:"📋",desc:"งานซ่อมอื่นๆ"},
];
const URGENCY = [
  {id:"low",label:"ปกติ",color:"#16a34a",bg:"#f0fdf4",border:"#bbf7d0"},
  {id:"medium",label:"เร่งด่วน",color:"#d97706",bg:"#fffbeb",border:"#fde68a"},
  {id:"high",label:"ฉุกเฉิน",color:"#dc2626",bg:"#fef2f2",border:"#fecaca"},
];
const STATUSES = [
  {id:"pending",label:"รอรับเรื่อง",color:"#d97706",bg:"#fffbeb",icon:"⏳"},
  {id:"accepted",label:"รับเรื่องแล้ว",color:"#7c3aed",bg:"#f5f3ff",icon:"📋"},
  {id:"in_progress",label:"กำลังซ่อม",color:"#2563eb",bg:"#eff6ff",icon:"🔧"},
  {id:"completed",label:"เสร็จสิ้น",color:"#16a34a",bg:"#f0fdf4",icon:"✅"},
  {id:"cancelled",label:"ยกเลิก",color:"#94a3b8",bg:"#f8fafc",icon:"✖️"},
];
const STATUS_MAP = {};
STATUSES.forEach(s => STATUS_MAP[s.id] = s);
const LOCATIONS = ["อาคาร A","อาคาร B","อาคาร C","อาคาร D","อาคารจอดรถ","ส่วนกลาง","โรงอาหาร","ห้องประชุมใหญ่"];
const ADMIN_PASS = "admin1234";

// ─── STATE ───
let state = {
  view: "home", requests: [], selected: null, search: "", fStatus: "all", fCat: "all",
  isAdmin: false, showAdminLogin: false, adminPass: "", sideOpen: false,
  form: {title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""},
  toast: null,
};

const STORAGE_KEY = "maint_sys_v3";

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.requests)); } catch(e) {}
}
function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if (d) state.requests = JSON.parse(d);
  } catch(e) {}
}

function genTicket() {
  const d = new Date();
  return `MR${String(d.getFullYear()).slice(-2)}${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.floor(Math.random()*10000)).padStart(4,"0")}`;
}
function fmtDate(d) { return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric"}); }
function fmtDateTime(d) { return new Date(d).toLocaleDateString("th-TH",{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}); }
function getCat(id) { return CATEGORIES.find(c=>c.id===id); }
function getUrg(id) { return URGENCY.find(u=>u.id===id); }

function showToast(msg, type="success") {
  state.toast = {msg, type};
  render();
  setTimeout(() => { state.toast = null; render(); }, 3000);
}

function nav(v) { state.view = v; state.sideOpen = false; state.selected = null; render(); }

function getStats() {
  return {
    total: state.requests.length,
    pending: state.requests.filter(r=>r.status==="pending").length,
    accepted: state.requests.filter(r=>r.status==="accepted").length,
    in_progress: state.requests.filter(r=>r.status==="in_progress").length,
    completed: state.requests.filter(r=>r.status==="completed").length,
  };
}

function getFiltered() {
  return state.requests.filter(r => {
    if (state.fStatus !== "all" && r.status !== state.fStatus) return false;
    if (state.fCat !== "all" && r.category !== state.fCat) return false;
    if (state.search) {
      const s = state.search.toLowerCase();
      return (r.title||"").toLowerCase().includes(s) || (r.reporter||"").toLowerCase().includes(s)
        || (r.id||"").toLowerCase().includes(s) || (r.department||"").toLowerCase().includes(s)
        || (r.location||"").toLowerCase().includes(s);
    }
    return true;
  });
}

function handleSubmit() {
  const f = state.form;
  if (!f.title || !f.category || !f.location || !f.reporter || !f.department) {
    showToast("กรุณากรอกข้อมูลที่จำเป็นให้ครบ","error");
    return;
  }
  const ticket = genTicket();
  const now = new Date().toISOString();
  const req = {...f, id:ticket, status:"pending", createdAt:now, updatedAt:now,
    history:[{status:"pending",at:now,note:"แจ้งซ่อมใหม่"}], adminNote:""};
  state.requests.unshift(req);
  saveData();
  state.form = {title:"",category:"",urgency:"low",location:"",floor:"",room:"",description:"",reporter:"",department:"",phone:"",email:""};
  state.selected = ticket;
  state.view = "success";
  render();
}

function updateStatus(id, newStatus) {
  const now = new Date().toISOString();
  state.requests = state.requests.map(r => {
    if (r.id !== id) return r;
    return {...r, status:newStatus, updatedAt:now,
      history:[...(r.history||[]),{status:newStatus,at:now,note:STATUS_MAP[newStatus]?.label}]};
  });
  saveData();
  showToast("อัปเดตสถานะเรียบร้อย");
}

function updateNote(id, note) {
  state.requests = state.requests.map(r => r.id===id ? {...r, adminNote:note} : r);
  saveData();
  showToast("บันทึกเรียบร้อย");
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ─── RENDER ───
function render() {
  const app = document.getElementById('app');
  const stats = getStats();
  const isMobile = window.innerWidth < 768;

  let html = '';

  // Mobile header
  html += `<div class="mobile-header">
    <button class="hamburger" onclick="state.sideOpen=!state.sideOpen;render()">☰</button>
    <span style="font-weight:700;font-size:16px">🔧 ระบบแจ้งซ่อม</span>
    <div style="width:36px"></div>
  </div>`;

  // Overlay
  html += `<div class="overlay ${state.sideOpen?'show':''}" onclick="state.sideOpen=false;render()"></div>`;

  // Sidebar
  html += `<div class="sidebar ${state.sideOpen?'open':''}">
    ${!isMobile ? `<div class="sidebar-logo">
      <div class="logo-circle">🔧</div>
      <div><div style="font-weight:700;font-size:15px">ระบบแจ้งซ่อม</div><div style="font-size:11px;color:#94a3b8">Maintenance System</div></div>
    </div>` : ''}
    <div class="nav-section"><div class="nav-label">พนักงาน</div>
      <button class="nav-btn ${state.view==='home'?'active':''}" onclick="nav('home')">🏠 หน้าหลัก</button>
      <button class="nav-btn ${state.view==='form'?'active':''}" onclick="nav('form')">📝 แจ้งซ่อมใหม่</button>
      <button class="nav-btn ${state.view==='track'||state.view==='detail'&&!state.isAdmin?'active':''}" onclick="nav('track')">🔍 ติดตามสถานะ</button>
    </div>
    ${state.isAdmin ? `<div class="nav-section"><div class="nav-label">ผู้ดูแล</div>
      <button class="nav-btn ${state.view==='admin_dash'?'active':''}" onclick="nav('admin_dash')">📊 แดชบอร์ด</button>
      <button class="nav-btn ${state.view==='admin_list'?'active':''}" onclick="nav('admin_list')">🛠️ จัดการรายการ ${stats.pending>0?`<span class="nav-badge">${stats.pending}</span>`:''}</button>
    </div>` : ''}
    <div class="sidebar-bottom">
      ${!state.isAdmin ? (state.showAdminLogin ? `
        <div style="display:flex;flex-direction:column;gap:6px">
          <input type="password" class="admin-input" placeholder="รหัสผู้ดูแล" id="adminPassInput" value="${esc(state.adminPass)}"
            oninput="state.adminPass=this.value" onkeydown="if(event.key==='Enter'){tryAdminLogin()}">
          <div style="display:flex;gap:4px">
            <button class="sm-btn" style="flex:1;background:#6366f1;color:#fff;border:none;font-size:12px;padding:6px 0" onclick="tryAdminLogin()">เข้าสู่ระบบ</button>
            <button class="sm-btn" style="background:transparent;color:#94a3b8;border:1px solid rgba(255,255,255,.1);font-size:12px;padding:6px 10px" onclick="state.showAdminLogin=false;render()">✕</button>
          </div>
          <div style="font-size:11px;color:#64748b">รหัสเริ่มต้น: admin1234</div>
        </div>
      ` : `<button class="nav-btn" style="font-size:13px;color:#64748b" onclick="state.showAdminLogin=true;render()">🔐 เข้าระบบผู้ดูแล</button>`)
      : `<button class="nav-btn" style="font-size:13px;color:#64748b" onclick="state.isAdmin=false;state.adminPass='';nav('home')">🚪 ออกจากระบบผู้ดูแล</button>`}
    </div>
  </div>`;

  // Main
  html += `<div class="main"><div class="content">`;

  // ===== HOME =====
  if (state.view === "home") {
    html += `<div class="anim-up" style="text-align:center">
      <div class="hero-banner">
        <div style="font-size:48px;margin-bottom:8px">🔧</div>
        <h1 class="hero-title">ระบบแจ้งซ่อมออนไลน์</h1>
        <p style="font-size:15px;color:#94a3b8;margin-top:6px">แจ้งปัญหา ติดตามสถานะ ได้ทุกที่ทุกเวลา</p>
      </div>
      <div class="home-grid">
        <button class="home-card" onclick="nav('form')">
          <span style="font-size:36px">📝</span>
          <span style="font-size:17px;font-weight:700;color:#0f172a">แจ้งซ่อมใหม่</span>
          <span style="font-size:13px;color:#94a3b8">กรอกข้อมูลแจ้งปัญหา</span>
        </button>
        <button class="home-card" onclick="nav('track')">
          <span style="font-size:36px">🔍</span>
          <span style="font-size:17px;font-weight:700;color:#0f172a">ติดตามสถานะ</span>
          <span style="font-size:13px;color:#94a3b8">ค้นหาเลขที่ / ดูรายการ</span>
        </button>
      </div>
      <div class="home-stats">
        <div><div style="font-size:28px;font-weight:800;color:#d97706">${stats.pending}</div><div style="font-size:13px;color:#64748b">รอรับเรื่อง</div></div>
        <div><div style="font-size:28px;font-weight:800;color:#2563eb">${stats.in_progress+stats.accepted}</div><div style="font-size:13px;color:#64748b">กำลังซ่อม</div></div>
        <div><div style="font-size:28px;font-weight:800;color:#16a34a">${stats.completed}</div><div style="font-size:13px;color:#64748b">เสร็จแล้ว</div></div>
      </div>
    </div>`;
  }

  // ===== FORM =====
  if (state.view === "form") {
    const f = state.form;
    html += `<div class="anim-up"><div class="form-card">
      <h2 style="font-size:20px;font-weight:700;color:#0f172a;margin-bottom:4px">📝 แจ้งซ่อมใหม่</h2>
      <p style="color:#94a3b8;font-size:14px;margin-bottom:20px">กรอกรายละเอียดให้ครบถ้วนเพื่อให้ช่างดำเนินการได้รวดเร็ว</p>

      <div class="section-label">ประเภทงานซ่อม <span style="color:#ef4444">*</span></div>
      <div class="cat-grid">
        ${CATEGORIES.map(c => `<button class="cat-btn ${f.category===c.id?'active':''}" onclick="state.form.category='${c.id}';render()">
          <span style="font-size:22px">${c.icon}</span>
          <span style="font-weight:600">${c.label}</span>
          <span style="font-size:11px;color:${f.category===c.id?'#818cf8':'#94a3b8'};line-height:1.2">${c.desc}</span>
        </button>`).join('')}
      </div>

      <div class="section-label">ข้อมูลปัญหา <span style="color:#ef4444">*</span></div>
      <div style="margin-bottom:12px">
        <label class="field-label">หัวข้อ / เรื่องแจ้งซ่อม *</label>
        <input class="input" value="${esc(f.title)}" oninput="state.form.title=this.value" placeholder="เช่น หลอดไฟเสีย, แอร์ไม่เย็น">
      </div>
      <div class="form-row">
        <div style="flex:2;min-width:180px">
          <label class="field-label">สถานที่ *</label>
          <select class="input" onchange="state.form.location=this.value;render()">
            <option value="" ${!f.location?'selected':''}>-- เลือก --</option>
            ${LOCATIONS.map(l => `<option ${f.location===l?'selected':''}>${l}</option>`).join('')}
          </select>
        </div>
        <div style="flex:1;min-width:80px">
          <label class="field-label">ชั้น</label>
          <input class="input" value="${esc(f.floor)}" oninput="state.form.floor=this.value" placeholder="เช่น 3">
        </div>
        <div style="flex:1;min-width:100px">
          <label class="field-label">ห้อง</label>
          <input class="input" value="${esc(f.room)}" oninput="state.form.room=this.value" placeholder="เช่น 301">
        </div>
      </div>
      <div style="margin-top:12px">
        <label class="field-label">รายละเอียดเพิ่มเติม</label>
        <textarea class="input" style="min-height:90px;resize:vertical" oninput="state.form.description=this.value" placeholder="อธิบายอาการ สิ่งที่พบ...">${esc(f.description)}</textarea>
      </div>
      <div style="margin-top:12px">
        <label class="field-label">ระดับความเร่งด่วน</label>
        <div style="display:flex;gap:10px">
          ${URGENCY.map(u => `<button class="urg-btn" style="color:${u.color};background:${f.urgency===u.id?u.bg:'#fff'};border:2px solid ${f.urgency===u.id?u.color:'#e2e8f0'};font-weight:${f.urgency===u.id?700:400}" onclick="state.form.urgency='${u.id}';render()">${u.label}</button>`).join('')}
        </div>
      </div>

      <div class="section-label">ข้อมูลผู้แจ้ง <span style="color:#ef4444">*</span></div>
      <div class="form-row">
        <div style="flex:1;min-width:160px">
          <label class="field-label">ชื่อ-นามสกุล *</label>
          <input class="input" value="${esc(f.reporter)}" oninput="state.form.reporter=this.value" placeholder="ชื่อจริง นามสกุล">
        </div>
        <div style="flex:1;min-width:160px">
          <label class="field-label">แผนก / ฝ่าย *</label>
          <input class="input" value="${esc(f.department)}" oninput="state.form.department=this.value" placeholder="เช่น ฝ่ายบัญชี">
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;min-width:160px">
          <label class="field-label">เบอร์โทร</label>
          <input class="input" value="${esc(f.phone)}" oninput="state.form.phone=this.value" placeholder="08X-XXX-XXXX">
        </div>
        <div style="flex:1;min-width:160px">
          <label class="field-label">อีเมล</label>
          <input class="input" value="${esc(f.email)}" oninput="state.form.email=this.value" placeholder="email@company.com">
        </div>
      </div>

      <button class="submit-btn" onclick="handleSubmit()" ${(!f.title||!f.category||!f.location||!f.reporter||!f.department)?'disabled':''}>📤 ส่งแจ้งซ่อม</button>
    </div></div>`;
  }

  // ===== SUCCESS =====
  if (state.view === "success") {
    html += `<div class="anim-pop"><div class="success-card">
      <div style="font-size:56px">✅</div>
      <h2 style="color:#16a34a;font-size:22px">แจ้งซ่อมสำเร็จ!</h2>
      <p style="color:#64748b">ระบบได้บันทึกรายการเรียบร้อยแล้ว</p>
      <div class="ticket-box">
        <div style="font-size:12px;color:#94a3b8;font-weight:600">เลขที่แจ้งซ่อม</div>
        <div style="font-size:28px;font-weight:800;color:#6366f1;letter-spacing:1px">${state.selected||''}</div>
        <div style="font-size:12px;color:#94a3b8">กรุณาจดเลขนี้ไว้เพื่อติดตามสถานะ</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="sm-btn" style="background:#f1f5f9;color:#334155;border:none;padding:10px 20px" onclick="nav('form')">+ แจ้งเพิ่ม</button>
        <button class="sm-btn" style="background:#6366f1;color:#fff;border:none;padding:10px 20px" onclick="state.view='detail';render()">ดูรายละเอียด →</button>
      </div>
    </div></div>`;
  }

  // ===== TRACK / ADMIN LIST =====
  if (state.view === "track" || state.view === "admin_list") {
    const isAL = state.view === "admin_list";
    const items = getFiltered();
    html += `<div class="anim-up">
      <div style="margin-bottom:16px">
        <h2 style="font-size:18px;font-weight:700">${isAL?'🛠️ จัดการรายการซ่อม':'ติดตามสถานะ'}</h2>
        <div style="color:#94a3b8;font-size:13px">${isAL?`ทั้งหมด ${state.requests.length} รายการ · รอรับเรื่อง ${stats.pending}`:'ค้นจากเลขที่ ชื่อผู้แจ้ง หรือสถานที่'}</div>
      </div>
      <div class="filter-bar">
        <input class="input" style="flex:1;max-width:260px" value="${esc(state.search)}" oninput="state.search=this.value;render()" placeholder="🔍 ค้นหา...">
        <select class="input" style="width:auto;min-width:140px" onchange="state.fStatus=this.value;render()">
          <option value="all">ทุกสถานะ</option>
          ${STATUSES.map(s=>`<option value="${s.id}" ${state.fStatus===s.id?'selected':''}>${s.icon} ${s.label}</option>`).join('')}
        </select>
        <select class="input" style="width:auto;min-width:140px" onchange="state.fCat=this.value;render()">
          <option value="all">ทุกประเภท</option>
          ${CATEGORIES.map(c=>`<option value="${c.id}" ${state.fCat===c.id?'selected':''}>${c.icon} ${c.label}</option>`).join('')}
        </select>
      </div>`;

    if (items.length === 0) {
      html += `<div style="text-align:center;padding:48px;color:#94a3b8"><div style="font-size:40px">📭</div><div style="margin-top:8px">ไม่พบรายการ</div></div>`;
    } else {
      items.forEach((r,i) => {
        const cat = getCat(r.category);
        const st = STATUS_MAP[r.status];
        const urg = getUrg(r.urgency);
        html += `<div class="list-row anim-up" style="animation-delay:${i*0.04}s" onclick="state.selected='${r.id}';state.view='detail';render()">
          <div style="display:flex;align-items:center;gap:12px;min-width:0;flex:1">
            <div class="list-icon">${cat?.icon||''}</div>
            <div style="min-width:0">
              <div style="font-weight:600;color:#0f172a;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.title)}</div>
              <div style="font-size:12px;color:#94a3b8;margin-top:2px">${esc(r.id)} · ${esc(r.location)}${isAL?' · '+esc(r.department):''} · ${esc(r.reporter)}</div>
            </div>
          </div>
          <div class="list-row-right" style="display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            ${urg?.id!=='low'?`<span class="pill-sm" style="color:${urg.color};background:${urg.bg}">${urg.label}</span>`:''}
            <span class="pill-sm" style="color:${st?.color};background:${st?.bg}">${st?.icon} ${st?.label}</span>
            <span style="font-size:12px;color:#cbd5e1;white-space:nowrap">${fmtDate(r.createdAt)}</span>
          </div>
        </div>`;
      });
    }
    html += `</div>`;
  }

  // ===== DETAIL =====
  if (state.view === "detail") {
    const r = state.requests.find(x=>x.id===state.selected);
    if (r) {
      const cat = getCat(r.category);
      const st = STATUS_MAP[r.status];
      const urg = getUrg(r.urgency);
      html += `<div class="anim-up">
        <button class="back-link" onclick="nav('${state.isAdmin?'admin_list':'track'}')">← ย้อนกลับ</button>
        <div class="detail-card">
          <div class="detail-top">
            <div>
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                <span style="font-size:28px">${cat?.icon}</span>
                <h2 style="font-size:20px;font-weight:700;color:#0f172a">${esc(r.title)}</h2>
              </div>
              <div style="color:#94a3b8;font-size:13px;margin-top:4px">เลขที่ <b style="color:#6366f1">${r.id}</b> · แจ้งเมื่อ ${fmtDateTime(r.createdAt)}</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <span class="pill" style="background:${urg?.bg};color:${urg?.color};border:1px solid ${urg?.border}">${urg?.label}</span>
              <span class="pill" style="background:${st?.bg};color:${st?.color}">${st?.icon} ${st?.label}</span>
            </div>
          </div>
          <div class="detail-grid">
            <div><div class="detail-field-label">สถานที่</div><div class="detail-field-val">${esc(r.location)}${r.floor?' ชั้น '+esc(r.floor):''}${r.room?' ห้อง '+esc(r.room):''}</div></div>
            <div><div class="detail-field-label">ประเภท</div><div class="detail-field-val">${cat?.icon} ${cat?.label}</div></div>
            <div><div class="detail-field-label">ผู้แจ้ง</div><div class="detail-field-val">${esc(r.reporter)}</div></div>
            <div><div class="detail-field-label">แผนก</div><div class="detail-field-val">${esc(r.department)}</div></div>
            <div><div class="detail-field-label">โทรศัพท์</div><div class="detail-field-val">${esc(r.phone)||'-'}</div></div>
            <div><div class="detail-field-label">อีเมล</div><div class="detail-field-val">${esc(r.email)||'-'}</div></div>
          </div>
          ${r.description?`<div style="margin-top:20px"><div class="detail-field-label">รายละเอียด</div><div style="background:#f8fafc;border-radius:10px;padding:14px 16px;line-height:1.8;color:#334155;font-size:14px;margin-top:4px;white-space:pre-wrap">${esc(r.description)}</div></div>`:''}
          ${r.adminNote&&!state.isAdmin?`<div style="margin-top:20px"><div class="detail-field-label">หมายเหตุจากช่าง</div><div style="background:#eff6ff;border-radius:10px;padding:14px 16px;line-height:1.8;color:#1e40af;font-size:14px;margin-top:4px;white-space:pre-wrap">${esc(r.adminNote)}</div></div>`:''}

          <div style="margin-top:28px;border-top:1px solid #f1f5f9;padding-top:20px">
            <div class="detail-field-label" style="margin-bottom:12px;font-size:13px">ประวัติสถานะ</div>
            ${(r.history||[]).map((h,i) => {
              const hs = STATUS_MAP[h.status];
              return `<div style="display:flex;gap:14px;padding-bottom:${i<r.history.length-1?'20px':'0'}">
                <div style="display:flex;flex-direction:column;align-items:center">
                  <div class="timeline-dot" style="background:${hs?.color||'#94a3b8'}"></div>
                  ${i<r.history.length-1?'<div class="timeline-line"></div>':''}
                </div>
                <div>
                  <div style="font-weight:600;font-size:14px;color:${hs?.color}">${hs?.icon} ${hs?.label}</div>
                  <div style="font-size:12px;color:#94a3b8">${fmtDateTime(h.at)}${h.note&&h.note!==hs?.label?' — '+esc(h.note):''}</div>
                </div>
              </div>`;
            }).join('')}
          </div>

          ${state.isAdmin?`<div style="margin-top:28px;border-top:1px solid #f1f5f9;padding-top:20px">
            <div class="detail-field-label" style="margin-bottom:10px">จัดการ (ผู้ดูแล)</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
              ${STATUSES.map(s=>`<button class="sm-btn" style="background:${r.status===s.id?s.bg:'#fff'};color:${s.color};border:1.5px solid ${r.status===s.id?s.color:'#e2e8f0'};font-weight:${r.status===s.id?700:500};opacity:${r.status===s.id?.6:1}" ${r.status===s.id?'disabled':''} onclick="updateStatus('${r.id}','${s.id}')">${s.icon} ${s.label}</button>`).join('')}
            </div>
            <div class="detail-field-label" style="margin-bottom:6px">หมายเหตุช่าง / บันทึก</div>
            <textarea class="input" id="adminNoteInput" style="min-height:70px;resize:vertical" placeholder="พิมพ์บันทึกเพิ่มเติม...">${esc(r.adminNote||'')}</textarea>
            <button class="sm-btn" style="background:#6366f1;color:#fff;border:none;margin-top:8px;padding:8px 20px" onclick="updateNote('${r.id}',document.getElementById('adminNoteInput').value)">💾 บันทึก</button>
          </div>`:''}
        </div>
      </div>`;
    }
  }

  // ===== ADMIN DASHBOARD =====
  if (state.view === "admin_dash" && state.isAdmin) {
    html += `<div class="anim-up">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px">📊 แดชบอร์ด</h2>
      <div class="dash-grid">
        ${[
          {l:"ทั้งหมด",v:stats.total,c:"#6366f1",bg:"#eef2ff",ic:"📊"},
          {l:"รอรับเรื่อง",v:stats.pending,c:"#d97706",bg:"#fffbeb",ic:"⏳"},
          {l:"รับเรื่องแล้ว",v:stats.accepted,c:"#7c3aed",bg:"#f5f3ff",ic:"📋"},
          {l:"กำลังซ่อม",v:stats.in_progress,c:"#2563eb",bg:"#eff6ff",ic:"🔧"},
          {l:"เสร็จสิ้น",v:stats.completed,c:"#16a34a",bg:"#f0fdf4",ic:"✅"},
        ].map((s,i)=>`<div class="stat-card anim-pop" style="background:${s.bg};animation-delay:${i*0.08}s">
          <span style="font-size:28px">${s.ic}</span>
          <div style="font-size:32px;font-weight:800;color:${s.c}">${s.v}</div>
          <div style="font-size:13px;color:#64748b">${s.l}</div>
        </div>`).join('')}
      </div>
      <h3 style="font-size:15px;font-weight:700;margin:28px 0 12px">ตามประเภท</h3>
      <div class="cat-summary">
        ${CATEGORIES.map(cat=>{
          const cnt=state.requests.filter(r=>r.category===cat.id).length;
          const pend=state.requests.filter(r=>r.category===cat.id&&(r.status==="pending"||r.status==="accepted")).length;
          return `<div class="cat-sum-card">
            <span style="font-size:20px">${cat.icon}</span>
            <span style="font-weight:600;font-size:14px">${cat.label}</span>
            <span style="font-size:18px;font-weight:700;color:#334155">${cnt}</span>
            ${pend>0?`<span style="font-size:11px;color:#d97706;font-weight:600">รอ ${pend}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html += `</div></div>`;

  // Toast
  if (state.toast) {
    const t = state.toast;
    html += `<div class="toast" style="background:${t.type==='error'?'#fef2f2':'#f0fdf4'};color:${t.type==='error'?'#dc2626':'#16a34a'};border:1px solid ${t.type==='error'?'#fecaca':'#bbf7d0'}">${t.type==='error'?'⚠️':'✅'} ${esc(t.msg)}</div>`;
  }

  app.innerHTML = html;
}

function tryAdminLogin() {
  if (state.adminPass === ADMIN_PASS) {
    state.isAdmin = true;
    state.showAdminLogin = false;
    render();
  } else {
    showToast("รหัสไม่ถูกต้อง","error");
  }
}

// Init
loadData();
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
